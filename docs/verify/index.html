<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상 인증 · 유튜브 챌린지</title>
<meta name="description" content="제작 주 일요일 자정까지 롱폼 영상 URL을 인증합니다.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.googleusercontent.com">
<style>
  :root {
    --paper: #ffffff; --paper-warm: #f6f5f4;
    --ink: #31302e; --ink-soft: #615d59; --ink-faint: #a39e98;
    --line: #dddddd; --accent: #2563EB; --accent-dark: #1D4ED8; --accent-bg: #eff4fe;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Pretendard","Pretendard Variable","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.62; max-width:800px; margin:0 auto;
    -webkit-font-smoothing:antialiased; }
  .doc { padding:34px 52px 40px; }
  .topnav { display:flex; gap:8px; border-bottom:1.5px solid var(--line); margin-bottom:30px; flex-wrap:wrap; }
  .topnav a { font-size:14.5px; font-weight:700; text-decoration:none; color:var(--ink-faint);
    padding:12px 4px; margin-bottom:-1.5px; border-bottom:2.5px solid transparent; margin-right:14px; }
  .topnav a.active { color:var(--accent); border-bottom-color:var(--accent); }
  .topnav a:hover { color:var(--ink-soft); }
  .eyebrow { font-size:13px; font-weight:800; letter-spacing:.08em; color:var(--accent-dark); margin-bottom:10px; }
  h1 { font-size:27px; font-weight:800; letter-spacing:-0.4px; margin-bottom:10px; }
  p.lede { color:var(--ink-soft); font-size:15px; margin-bottom:26px; }
  form { display:grid; gap:18px; }
  label { font-size:14px; font-weight:700; display:block; margin-bottom:6px; }
  .req { color:var(--accent); }
  input, select { width:100%; font:inherit; font-size:15px; padding:11px 13px;
    border:1.5px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); }
  input:focus, select:focus { outline:none; border-color:var(--accent); }
  .hint { font-size:12.5px; color:var(--ink-faint); margin-top:5px; }
  .submit-btn { font:inherit; font-size:16px; font-weight:800; color:#fff; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    border-radius:12px; padding:15px 20px; margin-top:6px; transition:.15s; }
  .submit-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(37,99,235,0.36); }
  .submit-btn:disabled { opacity:.6; cursor:default; transform:none; box-shadow:none; }
  .msg { border-radius:10px; padding:13px 16px; font-size:14px; display:none; }
  .msg.ok { background:var(--accent-bg); color:var(--accent-dark); }
  .msg.err { background:#fdf0ef; color:#b3392f; }
  h2 { font-size:19px; margin:44px 0 14px; padding-top:28px; border-top:1.5px solid var(--line); }
  .vlist { display:grid; gap:12px; }
  .vcard { border:1.5px solid var(--line); border-radius:14px; padding:16px 18px; background:var(--paper-warm); }
  .vcard .vhead { display:flex; gap:10px; align-items:baseline; flex-wrap:wrap; }
  .vcard .vname { font-weight:800; font-size:15.5px; }
  .vcard .vcycle { font-size:12.5px; font-weight:700; color:var(--accent-dark); background:var(--accent-bg);
    border-radius:20px; padding:1px 10px; }
  .vcard a { color:var(--accent-dark); font-size:14px; text-decoration:none; font-weight:600; }
  .vcard a:hover { text-decoration:underline; }
  footer { margin-top:44px; padding-top:16px; border-top:1px solid var(--line);
    font-size:12px; color:var(--ink-faint); }
</style>
</head>
<body>
<div class="doc">
  <nav class="topnav">
    <a href="../">제안서</a>
    <a href="../plan/">채널 한 장 기획서</a>
    <a href="../submit/">기획안 제출</a>
    <a href="./" class="active">영상 인증</a>
    <a href="../ot/">OT 자료</a>
  </nav>

  <div class="eyebrow">PRODUCTION WEEK · VERIFY</div>
  <h1>영상 인증</h1>
  <p class="lede">제작 주 <b>일요일 자정</b>까지 업로드한 롱폼 영상 URL을 제출하세요. 쇼츠(/shorts/)는 인정되지 않습니다. 같은 사이클에 다시 제출하면 기록이 갱신됩니다.</p>

  <form id="f">
    <div><label for="f-name">이름 <span class="req">*</span></label>
      <input id="f-name" name="name" maxlength="40" required placeholder="예: 임정"></div>
    <div><label for="f-email">이메일 <span class="req">*</span></label>
      <input id="f-email" name="email" type="email" maxlength="120" required placeholder="you@example.com">
      <div class="hint">확인 메일과 인증 현황 링크가 이 주소로 발송됩니다</div></div>
    <div><label for="f-cycle">사이클 <span class="req">*</span></label>
      <select id="f-cycle" name="cycle" required>
        <option value="1">사이클 1 · 영상 마감 08/02 (일)</option>
        <option value="2">사이클 2 · 영상 마감 08/16 (일)</option>
        <option value="3">사이클 3 · 영상 마감 08/30 (일)</option>
        <option value="4">사이클 4 · 영상 마감 09/13 (일)</option>
        <option value="5">사이클 5 · 영상 마감 09/27 (일)</option>
        <option value="6">사이클 6 · 영상 마감 10/11 (일)</option>
      </select></div>
    <div><label for="f-url">유튜브 영상 URL <span class="req">*</span></label>
      <input id="f-url" name="video_url" required placeholder="https://www.youtube.com/watch?v=...">
      <div class="hint">youtube.com/watch?v=... 또는 youtu.be/... · 공개(또는 일부공개) 상태여야 합니다</div></div>
    <button type="submit" class="submit-btn" id="btn">영상 인증하기</button>
    <div class="msg" id="msg"></div>
  </form>

  <section id="board" style="display:none">
    <h2>인증 현황</h2>
    <div class="vlist" id="vlist"></div>
  </section>

  <footer>© 2026 BuildnWrite. All rights reserved.</footer>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwKhHRacGbizn9nDf4go0yWjuj4tfiNGNAbXnbPMRRZIUATeRY91tyWPyhcQ5KBdpGs/exec';
  const f = document.getElementById('f'), btn = document.getElementById('btn'), msg = document.getElementById('msg');
  const esc = t => String(t||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  f.addEventListener('submit', async e => {
    e.preventDefault();
    const url = document.getElementById('f-url').value.trim();
    if (/youtube\.com\/shorts\//i.test(url)) return showMsg('err', '쇼츠는 인정되지 않습니다. 롱폼 영상 URL을 제출해주세요.');
    btn.disabled = true; btn.textContent = '인증 중…';
    try {
      const body = {
        form: 'verify',
        name: document.getElementById('f-name').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        cycle: document.getElementById('f-cycle').value,
        video_url: url
      };
      const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(body) });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '제출에 실패했습니다.');
      showMsg('ok', (data.resubmit ? '재인증 완료! 기록이 갱신됐습니다.' : '인증 완료! 확인 메일을 보냈습니다.')
        + (data.video_title ? ' — 「' + esc(data.video_title) + '」' : ''));
      loadBoard();
    } catch (err) {
      showMsg('err', err.message || '제출에 실패했습니다. 잠시 후 다시 시도해주세요.');
    } finally { btn.disabled = false; btn.textContent = '영상 인증하기'; }
  });

  function showMsg(kind, text){ msg.className = 'msg ' + kind; msg.style.display = 'block'; msg.innerHTML = text; }

  // 인증 현황: 토큰(?t=) 있을 때만 표시. 캐시 즉시 렌더 → 백그라운드 갱신
  const token = new URLSearchParams(location.search).get('t');
  function render(list){
    if (!list.length) return;
    document.getElementById('board').style.display = 'block';
    document.getElementById('vlist').innerHTML = list.map(v =>
      `<div class="vcard"><div class="vhead"><span class="vname">${esc(v.name)}</span><span class="vcycle">사이클 ${esc(v.cycle)}</span></div>
       <a href="${esc(v.video_url)}" target="_blank" rel="noopener">${esc(v.video_title || v.video_url)}</a></div>`).join('');
  }
  async function loadBoard(){
    if (!token) return;
    const KEY = 'verify-board:' + token;
    try { const c = JSON.parse(localStorage.getItem(KEY) || 'null'); if (c && c.list) render(c.list); } catch(e) {}
    try {
      const res = await fetch(`${API_URL}?action=verifications&t=${encodeURIComponent(token)}`);
      const data = await res.json();
      if (data.ok) { localStorage.setItem(KEY, JSON.stringify({list: data.verifications, at: Date.now()})); render(data.verifications); }
    } catch(e) {}
  }
  loadBoard();
</script>
</body>
</html>
